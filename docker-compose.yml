services:
  mongo:
    image: mongo:7
    container_name: vedai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: vedai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: vedai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/vedai
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: ./backend
    container_name: vedai-worker
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/vedai
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: vedai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NEXT_PUBLIC_DEMO_MODE: "false"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:

